{% extends 'base.html' %}

{% block title %}Contact{% endblock title %}

{% block body %}

<div class="max-w-4xl mx-auto py-12 px-6">
    <div class="text-center mb-10">
        <h2 class="text-4xl font-bold text-gray-900 mb-4">Humse Rabta Karen</h2>
        <p class="text-gray-600 text-lg">Hum jald jawab denge! 📧</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12">
        <form action="/contact" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
  
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Name</label>
                <input 
                    type="text" 
                    name="name"
                    id = "name"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" 
                    placeholder="Apna naam likhen">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input 
                    type="email" 
                    name="email"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" 
                    placeholder="apka@email.com">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Subject</label>
                <input 
                    type="text" 
                    name="subject"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" 
                    placeholder="Apna message ke baare mein likhen">
            </div>

            <!-- Message -->
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                <textarea 
                    name="message"
                    rows="5" 
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition resize-none" 
                    placeholder="Apna message likhen..."></textarea>
            </div>

            <!-- Button -->
            <div class="md:col-span-2">
                <button 
                    type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 transform hover:scale-105 shadow-md">
                    Send Message 📤
                </button>
            </div>
        </form>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
        <div class="text-center">
            <div class="text-4xl mb-3">📍</div>
            <h3 class="font-bold text-gray-900 mb-2">Location</h3>
            <p class="text-gray-600">Faisalabad, Pakistan</p>
        </div>
        <div class="text-center">
            <div class="text-4xl mb-3">📞</div>
            <h3 class="font-bold text-gray-900 mb-2">Phone</h3>
            <p class="text-gray-600">+92-XXX-XXXXXXX</p>
        </div>
        <div class="text-center">
            <div class="text-4xl mb-3">✉️</div>
            <h3 class="font-bold text-gray-900 mb-2">Email</h3>
            <p class="text-gray-600">info@icecream.com</p>
        </div>
    </div>
</div>
{% endblock %}
