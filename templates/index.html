{% extends 'base.html' %}

{% block title %}Home{% endblock title %}

{% block body %}

<!-- ✅ HERO BANNER (Main Visible Part) -->
<section class="bg-gradient-to-r from-pink-500 to-purple-600 text-white py-24">
    <div class="max-w-6xl mx-auto px-4 text-center">
        <h1 class="text-5xl md:text-6xl font-bold mb-4">ScoopMagic ✨</h1>
        <p class="text-xl md:text-2xl mb-6">Duniya ka sabse mazay dar Ice Cream Experience</p>
        <p class="text-lg mb-8 opacity-90">Har flavor mein khushboo, har scoopay mein khushi!</p>
        <button class="bg-white text-pink-600 font-bold px-8 py-4 rounded-lg hover:bg-gray-100 transition text-lg">
            Abhi Order Karo 🍦
        </button>
    </div>
</section>
<div class = "container">

    {% for chai in chais %}
    <h3>{{chai.name}}</h3>
    <a href="{%url 'chai_detail' chai.id%}">
        <button>
            {{chai.type}}
        </button>
    </a>
    
    {% endfor %}
</div>
{% endblock %}
