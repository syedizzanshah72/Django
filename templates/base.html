<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %} | First Website |</title>
    
    <!-- ✅ Tailwind CDN SIRF -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- ✅ NAVBAR (Tailwind) -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="/" class="text-2xl font-bold text-blue-600">Ice Cream</a>
                </div>

                <!-- Menu -->
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-700 hover:text-blue-600 font-semibold">Home</a>
                    <a href="/about" class="text-gray-700 hover:text-blue-600 font-semibold">About</a>
                    <a href="/services" class="text-gray-700 hover:text-blue-600 font-semibold">Services</a>
                    <a href="/contact" class="text-gray-700 hover:text-blue-600 font-semibold">Contact</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden">
                    <button class="text-gray-700 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ✅ Content Block -->
    {% block body %}{% endblock %}

</body>
</html>
